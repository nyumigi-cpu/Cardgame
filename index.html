<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>씹덕 카드게임 — 클래시 웨이브</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

:root {
  --fire: #ff4444; --water: #4488ff; --wood: #44bb44;
  --thunder: #ffdd00; --dark: #9944cc; --light: #ffee88;
  --fire-bg: linear-gradient(135deg,#ff6b35,#c0392b);
  --water-bg: linear-gradient(135deg,#3498db,#1a3a6c);
  --wood-bg: linear-gradient(135deg,#27ae60,#145a32);
  --thunder-bg: linear-gradient(135deg,#f1c40f,#b7950b);
  --dark-bg: linear-gradient(135deg,#6c3483,#1a0a2e);
  --light-bg: linear-gradient(135deg,#f9e547,#daa520);
  --gold: #ffc832; --pink: #e94560; --cyan: #00d4ff;
  --bg-dark: #0a0a1a; --bg-panel: rgba(255,255,255,0.04);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg-dark); color:#eee; min-height:100vh; overflow-x:hidden; }

/* ===== PARTICLE CANVAS ===== */
#particleCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

/* ===== SCREENS ===== */
.screen { display:none; position:relative; z-index:1; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; }

/* ===== TITLE SCREEN ===== */
#titleScreen {
  align-items:center; justify-content:center; text-align:center;
  background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a1a 70%);
}
.title-logo {
  font-size:3rem; font-weight:900; letter-spacing:-2px;
  background:linear-gradient(135deg, var(--pink), var(--gold), var(--cyan), var(--pink));
  background-size:300% 300%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  animation: gradientShift 4s ease infinite;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(233,69,96,0.5));
  margin-bottom:8px;
}
.title-sub {
  font-size:1rem; color:#888; margin-bottom:40px;
  letter-spacing:4px; text-transform:uppercase;
}
.title-cards {
  display:flex; gap:16px; margin-bottom:40px; perspective:800px;
}
.title-card-preview {
  width:80px; height:112px; border-radius:8px; position:relative;
  animation: floatCard 3s ease-in-out infinite;
  transform-style:preserve-3d;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.title-card-preview:nth-child(1) { animation-delay:0s; }
.title-card-preview:nth-child(2) { animation-delay:0.5s; }
.title-card-preview:nth-child(3) { animation-delay:1s; }
.title-card-preview:nth-child(4) { animation-delay:1.5s; }
.title-card-preview:nth-child(5) { animation-delay:2s; }

.btn-start {
  padding:16px 48px; border:2px solid var(--pink); border-radius:30px;
  background:transparent; color:var(--pink); font-family:inherit;
  font-size:1.2rem; font-weight:700; cursor:pointer;
  letter-spacing:3px; text-transform:uppercase;
  transition:all 0.3s ease; position:relative; overflow:hidden;
}
.btn-start:hover, .btn-start:active {
  background:var(--pink); color:#fff;
  box-shadow:0 0 40px rgba(233,69,96,0.6);
  transform:scale(1.05);
}
.btn-start::before {
  content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
  background:linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
  animation: shimmer 2s infinite linear;
}

/* ===== BATTLE SCREEN ===== */
#battleScreen { padding:8px; gap:4px; }

/* HP Bar */
.hp-section { display:flex; align-items:center; gap:8px; padding:4px 8px; }
.hp-section.enemy { flex-direction:row-reverse; }
.hp-label { font-size:0.7rem; font-weight:700; white-space:nowrap; min-width:50px; }
.hp-bar-outer {
  flex:1; height:22px; background:rgba(0,0,0,0.5); border-radius:11px;
  border:1px solid rgba(255,255,255,0.1); overflow:hidden; position:relative;
}
.hp-bar-inner {
  height:100%; border-radius:11px; transition:width 0.8s ease;
  position:relative; overflow:hidden;
}
.hp-bar-inner.player-bar { background:linear-gradient(90deg, #2ecc71, #27ae60); }
.hp-bar-inner.enemy-bar { background:linear-gradient(90deg, #e74c3c, #c0392b); }
.hp-bar-inner::after {
  content:''; position:absolute; top:0; left:0; right:0; height:50%;
  background:linear-gradient(180deg, rgba(255,255,255,0.25), transparent);
  border-radius:11px 11px 0 0;
}
.hp-text {
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  font-size:0.75rem; font-weight:900; text-shadow:0 1px 3px rgba(0,0,0,0.8);
}
.wave-gauge {
  display:flex; gap:3px; align-items:center;
}
.wave-pip {
  width:10px; height:10px; border-radius:50%; border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05); transition:all 0.3s;
}
.wave-pip.filled {
  background:var(--cyan); border-color:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
}

/* Battle Field */
.battle-field {
  flex:1; display:flex; flex-direction:column; gap:2px;
  padding:4px; min-height:0;
}
.field-row {
  display:flex; gap:8px; justify-content:center;
  flex:1; min-height:0;
}
.slot {
  flex:1; max-width:140px; border-radius:12px;
  border:2px dashed rgba(255,255,255,0.15);
  background:var(--bg-panel);
  display:flex; align-items:center; justify-content:center;
  position:relative; transition:all 0.3s;
  cursor:pointer; min-height:80px;
}
.slot:hover { border-color:rgba(255,255,255,0.3); }
.slot.droppable {
  border-color:var(--cyan); background:rgba(0,212,255,0.05);
  box-shadow:0 0 15px rgba(0,212,255,0.2);
  animation: slotPulse 1.5s infinite;
}
.slot.has-card { border-style:solid; }
.slot-label {
  position:absolute; top:4px; left:50%; transform:translateX(-50%);
  font-size:0.55rem; color:rgba(255,255,255,0.3); font-weight:700;
}
.vs-divider {
  text-align:center; padding:2px; font-weight:900; font-size:0.9rem;
  background:linear-gradient(90deg, transparent, rgba(233,69,96,0.3), transparent);
  color:var(--pink); letter-spacing:8px;
}

/* ===== CARD (in slot / in hand) ===== */
.card {
  width:100%; height:100%; border-radius:10px; overflow:hidden;
  position:relative; cursor:pointer;
  transition:transform 0.3s, box-shadow 0.3s;
}
.card-face {
  width:100%; height:100%; display:flex; flex-direction:column;
  padding:6px; position:relative;
}
/* Element BG */
.card[data-element="fire"] .card-face    { background:var(--fire-bg); }
.card[data-element="water"] .card-face   { background:var(--water-bg); }
.card[data-element="wood"] .card-face    { background:var(--wood-bg); }
.card[data-element="thunder"] .card-face { background:var(--thunder-bg); }
.card[data-element="dark"] .card-face    { background:var(--dark-bg); }
.card[data-element="light"] .card-face   { background:var(--light-bg); }

/* Card back (enemy hidden) */
.card-back {
  width:100%; height:100%; border-radius:10px;
  background: repeating-linear-gradient(
    45deg, #1a1a3a, #1a1a3a 10px, #151530 10px, #151530 20px
  );
  border:2px solid #333;
  display:flex; align-items:center; justify-content:center;
  font-size:1.5rem; position:relative; overflow:hidden;
}
.card-back::before {
  content:''; position:absolute; inset:8px; border:1px solid rgba(255,255,255,0.08);
  border-radius:6px;
}
.card-back::after {
  content:''; position:absolute; top:-100%; left:-100%; width:300%; height:300%;
  background:linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.03) 50%, transparent 60%);
  animation:shimmer 4s infinite linear;
}

/* Rarity glow */
.card[data-rarity="R"]   { box-shadow:0 0 10px rgba(70,130,230,0.4); border:1px solid #4682E6; }
.card[data-rarity="SR"]  { box-shadow:0 0 15px rgba(180,100,255,0.5); border:1px solid #B464FF; }
.card[data-rarity="SSR"] { box-shadow:0 0 20px rgba(255,200,50,0.6); border:1px solid var(--gold); }
.card[data-rarity="UR"]  { box-shadow:0 0 25px rgba(255,50,50,0.7); border:1px solid #FF3232; }
.card[data-rarity="N"]   { border:1px solid #555; }

/* Holo shimmer for SSR/UR */
.card[data-rarity="SSR"]::before,
.card[data-rarity="UR"]::before {
  content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
  background:linear-gradient(45deg,
    transparent 30%, rgba(255,215,0,0.15) 45%,
    rgba(255,255,255,0.2) 50%, rgba(0,212,255,0.15) 55%, transparent 70%
  );
  animation:shimmer 2.5s infinite linear; z-index:10; pointer-events:none;
}

.card-top { display:flex; justify-content:space-between; align-items:center; }
.card-cost {
  width:22px; height:22px; border-radius:50%;
  background:linear-gradient(135deg,#4a90d9,#2c5aa0);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:0.7rem; color:#fff;
  border:1.5px solid rgba(255,255,255,0.3);
}
.card-element-icon { font-size:0.9rem; }
.card-rarity-badge {
  font-size:0.5rem; font-weight:900; padding:1px 4px; border-radius:3px;
}
.card-rarity-badge[data-r="N"]   { background:#666; }
.card-rarity-badge[data-r="R"]   { background:#4682E6; }
.card-rarity-badge[data-r="SR"]  { background:#B464FF; }
.card-rarity-badge[data-r="SSR"] { background:linear-gradient(135deg,var(--gold),#FF8C00); color:#1a1a1a; }
.card-rarity-badge[data-r="UR"]  { background:linear-gradient(135deg,#FF3232,#FF0066); }

.card-art {
  flex:1; display:flex; align-items:center; justify-content:center;
  font-size:1.8rem; min-height:30px;
  border-radius:6px; margin:3px 0;
  position:relative; overflow:hidden;
}
.card-art::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(transparent 50%, rgba(0,0,0,0.3));
}

.card-name-text {
  font-weight:700; font-size:0.55rem; text-align:center;
  text-shadow:0 1px 4px rgba(0,0,0,0.9);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.card-stats-row {
  display:flex; justify-content:center; gap:8px;
  font-size:0.6rem; font-weight:700;
}
.stat-atk { color:#ff6b6b; }
.stat-hp { color:#51cf66; }
.card-skill-text {
  font-size:0.45rem; color:rgba(255,255,255,0.7); text-align:center;
  background:rgba(0,0,0,0.3); border-radius:3px; padding:2px 3px;
  line-height:1.2; margin-top:2px;
}

/* ===== HAND ===== */
.hand-section {
  padding:6px 4px; background:linear-gradient(0deg, rgba(0,0,0,0.6), transparent);
}
.hand-label {
  font-size:0.6rem; color:#666; text-align:center; margin-bottom:4px;
  letter-spacing:2px; text-transform:uppercase;
}
.hand-cards {
  display:flex; gap:6px; overflow-x:auto; padding:4px;
  justify-content:center; flex-wrap:nowrap;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.hand-cards::-webkit-scrollbar { display:none; }

.hand-card-wrapper {
  flex:0 0 auto; width:90px; height:126px;
  transition:transform 0.3s, margin 0.3s;
  cursor:pointer;
}
.hand-card-wrapper:hover { transform:translateY(-8px) scale(1.05); z-index:10; }
.hand-card-wrapper.selected {
  transform:translateY(-16px) scale(1.08);
  z-index:20;
  filter:brightness(1.2);
}
.hand-card-wrapper.selected::after {
  content:'▲ 배치할 슬롯 선택'; position:absolute; bottom:-18px; left:50%;
  transform:translateX(-50%); font-size:0.5rem; color:var(--cyan);
  white-space:nowrap; font-weight:700; animation:blink 1s infinite;
}

/* ===== ACTION BAR ===== */
.action-bar {
  display:flex; gap:8px; padding:6px 12px; justify-content:center;
}
.btn-action {
  padding:10px 28px; border-radius:25px; font-family:inherit;
  font-weight:700; font-size:0.9rem; cursor:pointer;
  border:2px solid; transition:all 0.3s; letter-spacing:1px;
}
.btn-clash {
  border-color:var(--pink); color:var(--pink); background:transparent;
}
.btn-clash:hover, .btn-clash.ready {
  background:var(--pink); color:#fff;
  box-shadow:0 0 30px rgba(233,69,96,0.5);
}
.btn-clash:disabled {
  opacity:0.3; cursor:not-allowed;
  box-shadow:none; background:transparent; color:var(--pink);
}
.btn-reset-slots {
  border-color:#666; color:#888; background:transparent;
}
.btn-reset-slots:hover { border-color:#aaa; color:#aaa; }

/* ===== CLASH OVERLAY ===== */
.clash-overlay {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(10px);
  flex-direction:column; align-items:center; justify-content:center;
  gap:20px;
}
.clash-overlay.active { display:flex; }
.clash-title {
  font-size:2.5rem; font-weight:900;
  background:linear-gradient(135deg, var(--pink), var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; animation:clashPulse 0.5s ease;
  letter-spacing:4px;
}
.clash-slot-result {
  display:flex; align-items:center; gap:16px; padding:12px;
  background:rgba(255,255,255,0.03); border-radius:12px;
  min-width:300px; justify-content:center;
  animation:slideInResult 0.4s ease;
  border:1px solid rgba(255,255,255,0.05);
}
.clash-card-mini {
  width:60px; height:80px; border-radius:8px; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:0.6rem; font-weight:700; text-align:center; padding:4px;
}
.clash-vs { font-size:1.2rem; font-weight:900; color:var(--pink); }
.clash-result-text {
  font-size:0.8rem; font-weight:700; text-align:center; min-width:80px;
}
.clash-result-text.win { color:#2ecc71; }
.clash-result-text.lose { color:#e74c3c; }
.clash-result-text.draw { color:#f1c40f; }
.clash-dmg-text { font-size:0.7rem; color:#ff6b6b; }
.clash-heal-text { font-size:0.7rem; color:#2ecc71; }

.btn-next-turn {
  padding:14px 40px; border:2px solid var(--cyan); border-radius:25px;
  background:transparent; color:var(--cyan); font-family:inherit;
  font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:2px;
  transition:all 0.3s; margin-top:16px;
}
.btn-next-turn:hover {
  background:var(--cyan); color:#000;
  box-shadow:0 0 30px rgba(0,212,255,0.5);
}

/* ===== END SCREEN ===== */
.end-overlay {
  display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.9); backdrop-filter:blur(20px);
  flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.end-overlay.active { display:flex; }
.end-title {
  font-size:3rem; font-weight:900; letter-spacing:4px;
}
.end-title.victory {
  background:linear-gradient(135deg, var(--gold), #FF8C00, var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:gradientShift 2s infinite;
  filter:drop-shadow(0 0 30px rgba(255,200,50,0.5));
}
.end-title.defeat {
  color:#e74c3c;
  text-shadow:0 0 30px rgba(231,76,60,0.5);
}
.end-sub { font-size:1rem; color:#888; }
.btn-restart {
  padding:14px 40px; border:2px solid var(--gold); border-radius:25px;
  background:transparent; color:var(--gold); font-family:inherit;
  font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:2px;
  transition:all 0.3s;
}
.btn-restart:hover {
  background:var(--gold); color:#000;
  box-shadow:0 0 30px rgba(255,200,50,0.5);
}

/* ===== TURN INDICATOR ===== */
.turn-indicator {
  text-align:center; font-size:0.7rem; color:rgba(255,255,255,0.4);
  padding:2px; letter-spacing:2px;
}

/* ===== ANIMATIONS ===== */
@keyframes gradientShift {
  0%,100% { background-position:0% 50%; }
  50% { background-position:100% 50%; }
}
@keyframes shimmer {
  0% { transform:translateX(-100%) translateY(-100%); }
  100% { transform:translateX(100%) translateY(100%); }
}
@keyframes floatCard {
  0%,100% { transform:translateY(0) rotateY(0deg); }
  25% { transform:translateY(-10px) rotateY(5deg); }
  75% { transform:translateY(-5px) rotateY(-5deg); }
}
@keyframes slotPulse {
  0%,100% { box-shadow:0 0 15px rgba(0,212,255,0.2); }
  50% { box-shadow:0 0 25px rgba(0,212,255,0.4); }
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
@keyframes clashPulse {
  0% { transform:scale(0.5); opacity:0; }
  50% { transform:scale(1.2); }
  100% { transform:scale(1); opacity:1; }
}
@keyframes slideInResult {
  from { transform:translateX(-30px); opacity:0; }
  to { transform:translateX(0); opacity:1; }
}
@keyframes damageFlash {
  0%,100% { filter:brightness(1); }
  50% { filter:brightness(2) saturate(0); }
}
@keyframes floatDmg {
  0% { transform:translateY(0); opacity:1; }
  100% { transform:translateY(-40px); opacity:0; }
}
@keyframes waveStrike {
  0% { transform:scale(0); opacity:0; }
  50% { transform:scale(1.5); opacity:1; }
  100% { transform:scale(2); opacity:0; }
}

/* ===== MOBILE ===== */
@media (max-width:480px) {
  .title-logo { font-size:2rem; }
  .title-card-preview { width:56px; height:78px; }
  .hand-card-wrapper { width:75px; height:105px; }
  .clash-slot-result { min-width:auto; flex-wrap:wrap; }
}
@media (min-width:768px) {
  .slot { max-width:180px; min-height:120px; }
  .hand-card-wrapper { width:110px; height:154px; }
  .card-name-text { font-size:0.7rem; }
  .card-art { font-size:2.5rem; }
}
</style>
</head>
<body>

<!-- PARTICLES -->
<canvas id="particleCanvas"></canvas>

<!-- ===== TITLE SCREEN ===== -->
<div id="titleScreen" class="screen active">
  <div class="title-logo">씹덕 카드게임</div>
  <div class="title-sub">클래시 웨이브</div>
  <div class="title-cards" id="titleCards"></div>
  <button class="btn-start" id="btnStart">BATTLE START</button>
</div>

<!-- ===== BATTLE SCREEN ===== -->
<div id="battleScreen" class="screen">
  <!-- Enemy HP -->
  <div class="hp-section enemy">
    <div class="hp-label">🤖 ENEMY</div>
    <div class="hp-bar-outer">
      <div class="hp-bar-inner enemy-bar" id="enemyHpBar" style="width:100%"></div>
      <span class="hp-text" id="enemyHpText">30/30</span>
    </div>
    <div class="wave-gauge" id="enemyWave"></div>
  </div>

  <div class="turn-indicator" id="turnIndicator">TURN 1</div>

  <!-- Battle Field -->
  <div class="battle-field">
    <!-- Enemy slots -->
    <div class="field-row" id="enemySlots">
      <div class="slot enemy-slot" data-slot="0"><span class="slot-label">SLOT 1</span></div>
      <div class="slot enemy-slot" data-slot="1"><span class="slot-label">SLOT 2</span></div>
      <div class="slot enemy-slot" data-slot="2"><span class="slot-label">SLOT 3</span></div>
    </div>

    <div class="vs-divider">⚔ CLASH ⚔</div>

    <!-- Player slots -->
    <div class="field-row" id="playerSlots">
      <div class="slot player-slot" data-slot="0"><span class="slot-label">SLOT 1</span></div>
      <div class="slot player-slot" data-slot="1"><span class="slot-label">SLOT 2</span></div>
      <div class="slot player-slot" data-slot="2"><span class="slot-label">SLOT 3</span></div>
    </div>
  </div>

  <!-- Player HP -->
  <div class="hp-section player">
    <div class="hp-label">👤 YOU</div>
    <div class="hp-bar-outer">
      <div class="hp-bar-inner player-bar" id="playerHpBar" style="width:100%"></div>
      <span class="hp-text" id="playerHpText">30/30</span>
    </div>
    <div class="wave-gauge" id="playerWave"></div>
  </div>

  <!-- Action Buttons -->
  <div class="action-bar">
    <button class="btn-action btn-reset-slots" id="btnResetSlots">초기화</button>
    <button class="btn-action btn-clash" id="btnClash" disabled>⚔ CLASH!</button>
  </div>

  <!-- Hand -->
  <div class="hand-section">
    <div class="hand-label">HAND</div>
    <div class="hand-cards" id="handCards"></div>
  </div>
</div>

<!-- ===== CLASH OVERLAY ===== -->
<div class="clash-overlay" id="clashOverlay">
  <div class="clash-title">⚔ CLASH! ⚔</div>
  <div id="clashResults"></div>
  <div id="clashSummary" style="text-align:center;"></div>
  <button class="btn-next-turn" id="btnNextTurn">다음 턴 →</button>
</div>

<!-- ===== END OVERLAY ===== -->
<div class="end-overlay" id="endOverlay">
  <div class="end-title" id="endTitle">VICTORY</div>
